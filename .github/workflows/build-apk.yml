name: Build APK

# Builds a signed release APK. The APK is universal (the app is a Capacitor
# WebView with no native libraries), so it runs on armv7, arm64 and x86 alike.
#
# - Push a tag like v1.2 → builds and publishes the APK to a GitHub Release
# - Manual run (workflow_dispatch) → builds and uploads the APK as an artifact

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      release_tag:
        description: 'Existing release tag to attach the APK to (optional)'
        required: false
        default: ''

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.release_tag || github.ref }}

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build web assets
        run: npm run build

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build release APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Collect APK
        run: cp android/app/build/outputs/apk/release/app-release.apk simple-todo.apk

      - uses: actions/upload-artifact@v4
        with:
          name: simple-todo-apk
          path: simple-todo.apk

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/') || inputs.release_tag != ''
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ inputs.release_tag || github.ref_name }}
        # If the release already exists (e.g. created manually in the UI),
        # attach/replace the APK instead of failing on creation.
        run: |
          if gh release view "$TAG" >/dev/null 2>&1; then
            gh release upload "$TAG" simple-todo.apk --clobber
          else
            gh release create "$TAG" simple-todo.apk \
              --title "Simple Todo $TAG" \
              --generate-notes
          fi
