<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Simple Todo</title>
  <style>
    /* ── CSS Variables ── */
    :root {
      --bg: #110c06;
      --bg2: #1c1208;
      --accent: #e8943a;
      --accent-dim: rgba(232, 148, 58, 0.42);
      --accent-xs: rgba(232, 148, 58, 0.055);
      --text: #f0e6d3;
      --text-dim: rgba(240, 230, 211, 0.30);
      --border: rgba(232, 148, 58, 0.52);
      --border-dim: rgba(232, 148, 58, 0.22);
      --danger: #e05050;
    }

    body.theme-oled {
      --bg: #000000;
      --bg2: #080808;
      --accent: #ffffff;
      --accent-dim: rgba(255, 255, 255, 0.38);
      --accent-xs: rgba(255, 255, 255, 0.05);
      --text: #ffffff;
      --text-dim: rgba(255, 255, 255, 0.28);
      --border: rgba(255, 255, 255, 0.42);
      --border-dim: rgba(255, 255, 255, 0.14);
      --danger: #e05050;
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
      -webkit-user-select: none;
      user-select: none;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: Arial, sans-serif;
      overflow-x: hidden;
    }

    /* ══════════════════════════════════════════
       DRAWER
    ══════════════════════════════════════════ */
    #drawer {
      position: fixed;
      top: 0;
      left: 0;
      width: 240px;
      height: 100%;
      background: var(--bg2);
      border-right: 1px solid var(--border-dim);
      z-index: 10;
      display: flex;
      flex-direction: column;
      padding-top: 52px;
    }

    .drawer-section {
      padding: 0 18px 10px;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent-dim);
      border-bottom: 1px solid var(--border-dim);
      margin-bottom: 4px;
    }

    .theme-item {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 13px 18px;
      cursor: pointer;
      border-bottom: 1px solid var(--border-dim);
      transition: background 0.15s;
    }

    .theme-item:active {
      background: var(--accent-xs);
    }

    .theme-dot {
      width: 32px;
      height: 32px;
      border-radius: 4px;
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
    }

    .theme-dot.classic {
      background: #110c06;
      border: 1px solid #e8943a;
    }

    .theme-dot.classic::before {
      content: '';
      position: absolute;
      top: 7px;
      left: 6px;
      width: 13px;
      height: 2px;
      background: #e8943a;
      border-radius: 1px;
    }

    .theme-dot.classic::after {
      content: '';
      position: absolute;
      top: 13px;
      left: 6px;
      width: 18px;
      height: 1px;
      background: rgba(232, 148, 58, 0.4);
      box-shadow: 0 4px 0 rgba(232, 148, 58, 0.4);
    }

    .theme-dot.oled {
      background: #000;
      border: 1px solid #fff;
    }

    .theme-dot.oled::before {
      content: '';
      position: absolute;
      top: 7px;
      left: 6px;
      width: 13px;
      height: 2px;
      background: #fff;
      border-radius: 1px;
    }

    .theme-dot.oled::after {
      content: '';
      position: absolute;
      top: 13px;
      left: 6px;
      width: 18px;
      height: 1px;
      background: rgba(255, 255, 255, 0.35);
      box-shadow: 0 4px 0 rgba(255, 255, 255, 0.35);
    }

    .theme-info {
      flex: 1;
    }

    .theme-name {
      font-size: 13px;
      color: var(--text);
    }

    .theme-sub {
      font-size: 10px;
      color: var(--accent-dim);
      margin-top: 2px;
    }

    .theme-check {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.2s;
    }

    .theme-item.active .theme-check {
      opacity: 1;
    }

    .drawer-div {
      height: 1px;
      background: var(--border-dim);
      margin: 6px 0;
    }

    .drawer-clear {
      display: flex;
      align-items: center;
      gap: 13px;
      padding: 14px 18px;
      cursor: pointer;
      color: var(--danger);
      font-size: 13px;
      transition: background 0.15s;
    }

    .drawer-clear:active {
      background: rgba(224, 80, 80, 0.09);
    }

    .dc-icon {
      font-size: 15px;
      width: 32px;
      text-align: center;
    }

    /* ══════════════════════════════════════════
       MAIN
    ══════════════════════════════════════════ */
    #main {
      position: relative;
      z-index: 20;
      min-height: 100vh;
      background: var(--bg);
      transform: translateX(0);
      will-change: transform;
    }

    #main.snap {
      transition: transform 0.28s cubic-bezier(0.25, 0.8, 0.5, 1);
    }

    #drawerMask {
      display: none;
      position: fixed;
      inset: 0;
      z-index: 25;
      cursor: pointer;
    }

    #drawerMask.active {
      display: block;
    }

    /* ══════════════════════════════════════════
       EDITABLE TITLE
    ══════════════════════════════════════════ */
    .app-header {
      padding: 28px 16px 16px;
      text-align: center;
    }

    .app-title {
      font-size: 11px;
      letter-spacing: 4px;
      text-transform: uppercase;
      color: var(--accent);
      outline: none;
      display: inline-block;
      padding: 3px 6px 5px;
      border-bottom: 1px solid transparent;
      transition: border-color 0.2s;
      min-width: 24px;
      cursor: text;
      -webkit-user-select: text;
      user-select: text;
    }

    .app-title:empty::before {
      content: attr(data-placeholder);
      color: var(--accent-dim);
    }

    .app-title:focus {
      border-bottom-color: var(--accent-dim);
    }

    /* ══════════════════════════════════════════
       CATEGORIES  —  floating-label border style
    ══════════════════════════════════════════ */
    .categories {
      padding: 0 14px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      /* extra gap for the floating labels */
      padding-top: 8px;
    }

    .category {
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      background: transparent;
      position: relative;
      padding-top: 18px;
      /* room under the floating header */
      padding-bottom: 8px;
      overflow: visible;
      /* let label float above border */
    }

    .category::before,
    .category::after {
      content: '';
      position: absolute;
      left: 0;
      right: 0;
      height: 8px;
      border-left: 1px solid var(--border);
      border-right: 1px solid var(--border);
      pointer-events: none;
    }

    .category::before {
      top: 0;
    }

    .category::after {
      bottom: 0;
    }

    /* The floating header sits ON the top border */
    .category-header {
      position: absolute;
      top: -7px;
      /* center the text on the border line */
      left: 0;
      right: 0;
      padding: 0 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      z-index: 2;
    }

    .category-name {
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: 700;
      background: var(--bg);
      /* masks the border underneath */
      padding: 0 8px;
      line-height: 1.2;
      transition: opacity 0.15s;
    }

    .category-count {
      font-size: 10px;
      color: var(--accent-dim);
      background: var(--bg);
      /* masks the border */
      padding: 0 8px;
      line-height: 1.2;
      transition: opacity 0.15s;
    }

    .category-header.pressing .category-name,
    .category-header.pressing .category-count {
      opacity: 0.55;
    }

    /* ── Tasks ── */
    .tasks {
      padding: 4px 0 4px;
    }

    .task-item {
      display: flex;
      align-items: flex-start;
      padding: 8px 12px 8px 10px;
      gap: 10px;
      cursor: pointer;
      transition: background 0.12s;
    }

    .task-item.pressing {
      background: var(--accent-xs);
    }

    .task-bullet {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--accent);
      margin-top: 8px;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .task-item.done .task-bullet {
      background: var(--accent-dim);
    }

    /* ── Animated strikethrough ── */
    .task-text {
      font-size: 15px;
      line-height: 1.45;
      color: var(--text);
      flex: 1;
      white-space: pre-wrap;
      word-break: break-word;
      /* the strikethrough "line" is a background gradient */
      background-image: linear-gradient(var(--text-dim), var(--text-dim));
      background-position: 0 52%;
      background-repeat: no-repeat;
      background-size: 0% 1.5px;
      transition: color 0.28s ease 0.08s;
    }

    /* Pre-existing done tasks: line already there, no animation */
    .task-item.done .task-text {
      color: var(--text-dim);
      background-size: 100% 1.5px;
    }

    /* Newly toggled: animate the line growing left → right */
    .task-item.done.strike-anim .task-text {
      animation: strikeGrow 0.38s ease-out 0.04s forwards;
      background-size: 0% 1.5px !important;
      /* start from zero */
    }

    @keyframes strikeGrow {
      to {
        background-size: 100% 1.5px;
      }
    }

    /* ── Add Task ── */
    .add-task-btn {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px 10px 10px;
      cursor: pointer;
      opacity: 0.38;
      transition: opacity 0.2s;
    }

    .add-task-btn:active {
      opacity: 0.65;
    }

    .add-task-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      border: 1px solid var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      color: var(--accent);
      flex-shrink: 0;
    }

    .add-task-btn span {
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--accent);
      text-transform: uppercase;
    }

    /* ── Add Category ── */
    .add-category-wrap {
      padding: 8px 14px 0;
    }

    .add-category-btn {
      border: 1px dashed var(--border-dim);
      border-radius: 2px;
      padding: 13px 12px;
      text-align: center;
      cursor: pointer;
      color: var(--accent-dim);
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      transition: all 0.2s;
    }

    .add-category-btn:active {
      background: var(--accent-xs);
      color: var(--accent);
      border-color: var(--border);
    }

    /* ══════════════════════════════════════════
       BOTTOM SHEET
    ══════════════════════════════════════════ */
    .sheet-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 100;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
    }

    .sheet-overlay.active {
      display: flex;
      align-items: flex-end;
    }

    .sheet {
      width: 100%;
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      overflow: hidden;
      animation: slideUp 0.22s cubic-bezier(0.25, 0.8, 0.5, 1);
    }

    @keyframes slideUp {
      from {
        transform: translateY(100%)
      }

      to {
        transform: translateY(0)
      }
    }

    .sheet-label {
      padding: 13px 18px 11px;
      font-size: 10px;
      letter-spacing: 2px;
      color: var(--accent-dim);
      text-transform: uppercase;
      border-bottom: 1px solid var(--border-dim);
    }

    .sheet-item {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 15px 18px;
      font-size: 15px;
      color: var(--text);
      cursor: pointer;
      border-bottom: 1px solid var(--border-dim);
      transition: background 0.12s;
    }

    .sheet-item:last-child {
      border-bottom: none;
    }

    .sheet-item:active {
      background: var(--accent-xs);
    }

    .sheet-item.danger {
      color: var(--danger);
    }

    .sheet-item .s-icon {
      width: 22px;
      text-align: center;
      font-size: 16px;
      opacity: 0.85;
    }

    /* ══════════════════════════════════════════
       DIALOG
    ══════════════════════════════════════════ */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.72);
      z-index: 200;
      align-items: flex-end;
      justify-content: center;
      padding: 0;
    }

    .dialog-overlay.active {
      display: flex;
    }

    .dialog {
      background: var(--bg2);
      border-top: 1px solid var(--border);
      border-radius: 14px 14px 0 0;
      padding: 22px 18px 32px;
      width: 100%;
      max-width: 600px;
      animation: slideUp 0.22s cubic-bezier(0.25, 0.8, 0.5, 1);
    }

    .dialog-title {
      font-size: 10px;
      letter-spacing: 2.5px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 14px;
    }

    /* shared input/textarea styles */
    .dialog input,
    .dialog textarea {
      width: 100%;
      background: var(--accent-xs);
      border: 1px solid var(--border-dim);
      border-radius: 4px;
      padding: 11px 12px;
      color: var(--text);
      font-size: 15px;
      outline: none;
      -webkit-user-select: text;
      user-select: text;
      transition: border-color 0.2s;
      font-family: Arial, sans-serif;
    }

    .dialog input::placeholder,
    .dialog textarea::placeholder {
      color: var(--text-dim);
    }

    .dialog input:focus,
    .dialog textarea:focus {
      border-color: var(--border);
    }

    /* textarea specific */
    .dialog textarea {
      resize: none;
      line-height: 1.55;
      min-height: 110px;
    }

    .dialog-hint {
      font-size: 10px;
      color: var(--accent-dim);
      letter-spacing: 0.5px;
      margin-top: 7px;
    }

    .dialog-buttons {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }

    .d-btn {
      flex: 1;
      padding: 12px;
      border: none;
      border-radius: 4px;
      font-size: 11px;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      cursor: pointer;
      font-weight: 600;
    }

    .d-btn.cancel {
      background: var(--accent-xs);
      color: var(--accent-dim);
    }

    .d-btn.confirm {
      background: var(--accent);
      color: var(--bg);
    }

    .d-btn.confirm:active {
      filter: brightness(0.85);
    }
  </style>
</head>

<body class="theme-classic">

  <!-- ══ DRAWER ══════════════════════════════════════ -->
  <div id="drawer">
    <div class="drawer-section">Themes</div>

    <div class="theme-item active" id="ti-classic" onclick="setTheme('classic')">
      <div class="theme-dot classic"></div>
      <div class="theme-info">
        <div class="theme-name">Classic</div>
        <div class="theme-sub">Amber · Dark</div>
      </div>
      <div class="theme-check"></div>
    </div>

    <div class="theme-item" id="ti-oled" onclick="setTheme('oled')">
      <div class="theme-dot oled"></div>
      <div class="theme-info">
        <div class="theme-name">OLED</div>
        <div class="theme-sub">Black · White</div>
      </div>
      <div class="theme-check"></div>
    </div>

    <div class="drawer-div"></div>

    <div class="drawer-clear" onclick="confirmClearAll()">
      <span class="dc-icon">✕</span>
      Clear All
    </div>
  </div>

  <!-- ══ MAIN ════════════════════════════════════════ -->
  <div id="main">
    <div id="drawerMask"></div>

    <div class="app-header">
      <!-- Editable title: tap to rename, leave empty for no title -->
      <div class="app-title" id="appTitle" contenteditable="true" spellcheck="false" data-placeholder="Simple Todo">
      </div>
    </div>

    <div class="categories" id="categoriesContainer"></div>

    <div class="add-category-wrap">
      <div class="add-category-btn" id="addCategoryBtn">+ Add Category</div>
    </div>
  </div>

  <!-- ══ BOTTOM SHEET ════════════════════════════════ -->
  <div class="sheet-overlay" id="sheetOverlay">
    <div class="sheet">
      <div class="sheet-label" id="sheetLabel">Options</div>
      <div id="sheetItems"></div>
    </div>
  </div>

  <!-- ══ DIALOG ═════════════════════════════════════ -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
      <div class="dialog-title" id="dialogTitle">Rename</div>

      <!-- Small input for category names -->
      <input type="text" id="dialogInput" placeholder="Category name…" />

      <!-- Big textarea for task text -->
      <textarea id="dialogTextarea" placeholder="Describe your task…" style="display:none;"></textarea>

      <div class="dialog-hint" id="dialogHint" style="display:none;">
        Ctrl + Enter to save
      </div>

      <div class="dialog-buttons">
        <button class="d-btn cancel" onclick="closeDialog()">Cancel</button>
        <button class="d-btn confirm" onclick="confirmDialog()">Save</button>
      </div>
    </div>
  </div>

  <script>
    // ════════════════════════════════════════════════════════
    //  STATE
    // ════════════════════════════════════════════════════════
    const state = {
      theme: 'classic',
      categories: [
        {
          id: 'c1', name: 'Personal Tasks',
          tasks: [
            { id: 't1', text: 'Buy groceries for the week', done: false },
            { id: 't2', text: 'Call the dentist and schedule an appointment', done: false },
          ]
        },
        {
          id: 'c2', name: 'Work',
          tasks: [
            { id: 't3', text: 'Finish the project report for the client', done: true },
            { id: 't4', text: 'Review pull requests before standup', done: false },
            { id: 't5', text: 'Update documentation on the internal wiki', done: false },
          ]
        },
        {
          id: 'c3', name: 'Ideas',
          tasks: [
            { id: 't6', text: 'Build a habit tracker app', done: false },
          ]
        }
      ]
    };

    // tracks task IDs that are *currently animating* the strike line
    const strikeAnimSet = new Set();

    let pressTimer = null;
    let dialogCb = null;
    let dialogIsTask = false;

    // ════════════════════════════════════════════════════════
    //  RENDER
    // ════════════════════════════════════════════════════════
    function render() {
      const container = document.getElementById('categoriesContainer');
      container.innerHTML = '';

      state.categories.forEach(cat => {
        const catEl = document.createElement('div');
        catEl.className = 'category';

        // floating header label
        const doneN = cat.tasks.filter(t => t.done).length;
        const header = document.createElement('div');
        header.className = 'category-header';
        header.innerHTML = `
      <span class="category-name">${esc(cat.name)}</span>
      <span class="category-count">${doneN}/${cat.tasks.length}</span>
    `;
        setupLongPress(header, () => openCategorySheet(cat.id));
        catEl.appendChild(header);

        // tasks
        const tasksEl = document.createElement('div');
        tasksEl.className = 'tasks';

        cat.tasks.forEach(task => {
          const el = document.createElement('div');
          let cls = 'task-item';
          if (task.done) cls += ' done';
          if (strikeAnimSet.has(task.id)) cls += ' strike-anim';
          el.className = cls;

          el.innerHTML = `
        <div class="task-bullet"></div>
        <div class="task-text">${esc(task.text)}</div>
      `;
          el.addEventListener('click', () => toggleTask(cat.id, task.id));
          setupLongPress(el, () => openTaskSheet(cat.id, task.id));
          tasksEl.appendChild(el);
        });

        // add task button
        const addBtn = document.createElement('div');
        addBtn.className = 'add-task-btn';
        addBtn.innerHTML = `<div class="add-task-icon">+</div><span>Add task</span>`;
        addBtn.addEventListener('click', () => promptAddTask(cat.id));
        tasksEl.appendChild(addBtn);

        catEl.appendChild(tasksEl);
        container.appendChild(catEl);
      });
    }

    // ════════════════════════════════════════════════════════
    //  LONG PRESS
    // ════════════════════════════════════════════════════════
    function setupLongPress(el, cb) {
      let sx = 0, sy = 0;
      const start = (e) => {
        const p = e.touches ? e.touches[0] : e;
        sx = p.clientX; sy = p.clientY;
        el.classList.add('pressing');
        pressTimer = setTimeout(() => {
          el.classList.remove('pressing');
          navigator.vibrate && navigator.vibrate(30);
          cb();
        }, 480);
      };
      const cancel = () => { clearTimeout(pressTimer); el.classList.remove('pressing'); };
      const move = (e) => {
        const p = e.touches ? e.touches[0] : e;
        if (Math.abs(p.clientX - sx) > 9 || Math.abs(p.clientY - sy) > 9) cancel();
      };
      el.addEventListener('touchstart', start, { passive: true });
      el.addEventListener('touchend', cancel);
      el.addEventListener('touchcancel', cancel);
      el.addEventListener('touchmove', move, { passive: true });
      el.addEventListener('mousedown', start);
      el.addEventListener('mouseup', cancel);
      el.addEventListener('mouseleave', cancel);
    }

    // ════════════════════════════════════════════════════════
    //  DRAWER SWIPE
    // ════════════════════════════════════════════════════════
    const mainEl = document.getElementById('main');
    const maskEl = document.getElementById('drawerMask');
    const DRAWER_W = 240;

    let drawerOpen = false;
    let swTouchX = 0, swTouchY = 0;
    let swDir = null, swActive = false, swBase = 0;

    function applyOffset(x, animate) {
      const c = Math.max(0, Math.min(DRAWER_W, x));
      if (animate) mainEl.classList.add('snap');
      else mainEl.classList.remove('snap');
      mainEl.style.transform = `translateX(${c}px)`;
    }
    function openDrawer(a) { drawerOpen = true; applyOffset(DRAWER_W, a !== false); maskEl.classList.add('active'); }
    function closeDrawer(a) { drawerOpen = false; applyOffset(0, a !== false); maskEl.classList.remove('active'); }

    maskEl.addEventListener('click', () => closeDrawer());

    document.addEventListener('touchstart', (e) => {
      if (overlayOpen()) return;
      swTouchX = e.touches[0].clientX;
      swTouchY = e.touches[0].clientY;
      swDir = null; swActive = false;
      swBase = drawerOpen ? DRAWER_W : 0;
    }, { passive: true });

    document.addEventListener('touchmove', (e) => {
      if (overlayOpen()) return;
      const dx = e.touches[0].clientX - swTouchX;
      const dy = e.touches[0].clientY - swTouchY;
      if (!swDir) {
        if (Math.abs(dx) < 5 && Math.abs(dy) < 5) return;
        swDir = Math.abs(dx) >= Math.abs(dy) ? 'h' : 'v';
      }
      if (swDir !== 'h') return;
      if (!drawerOpen && swTouchX > 44 && dx > 0) return;
      e.preventDefault();
      swActive = true;
      applyOffset(swBase + dx, false);
    }, { passive: false });

    document.addEventListener('touchend', (e) => {
      if (!swActive) return;
      swActive = false;
      const dx = e.changedTouches[0].clientX - swTouchX;
      if (drawerOpen) { dx < -44 ? closeDrawer() : openDrawer(); }
      else { dx > 44 ? openDrawer() : closeDrawer(); }
    });

    function overlayOpen() {
      return document.getElementById('sheetOverlay').classList.contains('active') ||
        document.getElementById('dialogOverlay').classList.contains('active');
    }

    // ════════════════════════════════════════════════════════
    //  THEME
    // ════════════════════════════════════════════════════════
    function setTheme(theme) {
      state.theme = theme;
      document.body.className = 'theme-' + theme;
      document.getElementById('ti-classic').classList.toggle('active', theme === 'classic');
      document.getElementById('ti-oled').classList.toggle('active', theme === 'oled');
      closeDrawer();
    }

    // ════════════════════════════════════════════════════════
    //  CLEAR ALL
    // ════════════════════════════════════════════════════════
    function confirmClearAll() {
      closeDrawer();
      setTimeout(() => {
        openSheet('Clear everything?', [
          {
            icon: '✕', label: 'Yes, delete all', danger: true,
            action: () => { state.categories = []; render(); }
          },
          { icon: '←', label: 'Cancel', action: () => { } },
        ]);
      }, 300);
    }

    // ════════════════════════════════════════════════════════
    //  BOTTOM SHEET
    // ════════════════════════════════════════════════════════
    function openSheet(label, items) {
      document.getElementById('sheetLabel').textContent = label;
      const c = document.getElementById('sheetItems');
      c.innerHTML = '';
      items.forEach(item => {
        const el = document.createElement('div');
        el.className = 'sheet-item' + (item.danger ? ' danger' : '');
        el.innerHTML = `<span class="s-icon">${item.icon}</span>${item.label}`;
        el.addEventListener('click', () => { closeSheet(); item.action(); });
        c.appendChild(el);
      });
      document.getElementById('sheetOverlay').classList.add('active');
    }
    function closeSheet() {
      document.getElementById('sheetOverlay').classList.remove('active');
    }
    document.getElementById('sheetOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('sheetOverlay')) closeSheet();
    });

    function openCategorySheet(catId) {
      const cat = state.categories.find(c => c.id === catId);
      if (!cat) return;
      openSheet(cat.name, [
        { icon: '✏️', label: 'Rename category', action: () => promptRenameCategory(catId) },
        { icon: '🗑️', label: 'Delete category', danger: true, action: () => deleteCategory(catId) },
      ]);
    }

    function openTaskSheet(catId, taskId) {
      const cat = state.categories.find(c => c.id === catId);
      const task = cat?.tasks.find(t => t.id === taskId);
      if (!task) return;
      const lbl = task.text.length > 42 ? task.text.slice(0, 42) + '…' : task.text;
      openSheet(lbl, [
        {
          icon: task.done ? '○' : '✓',
          label: task.done ? 'Mark as incomplete' : 'Mark as complete',
          action: () => toggleTask(catId, taskId)
        },
        { icon: '✏️', label: 'Edit task', action: () => promptEditTask(catId, taskId) },
        { icon: '🗑️', label: 'Delete task', danger: true, action: () => deleteTask(catId, taskId) },
      ]);
    }

    // ════════════════════════════════════════════════════════
    //  DIALOG  (input for names, textarea for tasks)
    // ════════════════════════════════════════════════════════
    function openDialog(title, value, cb, isTask) {
      dialogIsTask = !!isTask;
      dialogCb = cb;

      document.getElementById('dialogTitle').textContent = title;

      const input = document.getElementById('dialogInput');
      const textarea = document.getElementById('dialogTextarea');
      const hint = document.getElementById('dialogHint');

      if (isTask) {
        input.style.display = 'none';
        textarea.style.display = 'block';
        hint.style.display = 'block';
        textarea.value = value;
        document.getElementById('dialogOverlay').classList.add('active');
        setTimeout(() => { textarea.focus(); textarea.selectionStart = textarea.value.length; }, 130);
      } else {
        textarea.style.display = 'none';
        hint.style.display = 'none';
        input.style.display = 'block';
        input.value = value;
        document.getElementById('dialogOverlay').classList.add('active');
        setTimeout(() => { input.focus(); input.select(); }, 130);
      }
    }

    function closeDialog() {
      document.getElementById('dialogOverlay').classList.remove('active');
      dialogCb = null;
    }

    function confirmDialog() {
      const val = (dialogIsTask
        ? document.getElementById('dialogTextarea').value
        : document.getElementById('dialogInput').value
      ).trim();
      if (dialogCb && val) dialogCb(val);
      closeDialog();
    }

    // Input: Enter confirms
    document.getElementById('dialogInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') confirmDialog();
      if (e.key === 'Escape') closeDialog();
    });

    // Textarea: Ctrl/Cmd+Enter confirms, Escape cancels
    document.getElementById('dialogTextarea').addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') confirmDialog();
      if (e.key === 'Escape') closeDialog();
    });

    document.getElementById('dialogOverlay').addEventListener('click', e => {
      if (e.target === document.getElementById('dialogOverlay')) closeDialog();
    });

    // ════════════════════════════════════════════════════════
    //  ACTIONS
    // ════════════════════════════════════════════════════════
    function toggleTask(catId, taskId) {
      const task = state.categories.find(c => c.id === catId)?.tasks.find(t => t.id === taskId);
      if (!task) return;
      task.done = !task.done;

      if (task.done) {
        strikeAnimSet.add(taskId);
        // remove anim class after animation completes
        setTimeout(() => { strikeAnimSet.delete(taskId); }, 520);
      } else {
        strikeAnimSet.delete(taskId);
      }
      render();
    }

    function promptRenameCategory(catId) {
      const cat = state.categories.find(c => c.id === catId);
      if (!cat) return;
      openDialog('Rename category', cat.name, val => { cat.name = val; render(); }, false);
    }

    function deleteCategory(catId) {
      state.categories = state.categories.filter(c => c.id !== catId);
      render();
    }

    function promptEditTask(catId, taskId) {
      const task = state.categories.find(c => c.id === catId)?.tasks.find(t => t.id === taskId);
      if (!task) return;
      openDialog('Edit task', task.text, val => { task.text = val; render(); }, true);
    }

    function deleteTask(catId, taskId) {
      const cat = state.categories.find(c => c.id === catId);
      if (cat) { cat.tasks = cat.tasks.filter(t => t.id !== taskId); render(); }
    }

    function promptAddTask(catId) {
      openDialog('New task', '', val => {
        const cat = state.categories.find(c => c.id === catId);
        if (cat) { cat.tasks.push({ id: 't' + Date.now(), text: val, done: false }); render(); }
      }, true);
    }

    document.getElementById('addCategoryBtn').addEventListener('click', () => {
      openDialog('New category', '', val => {
        state.categories.push({ id: 'c' + Date.now(), name: val, tasks: [] });
        render();
      }, false);
    });

    // ════════════════════════════════════════════════════════
    //  HELPERS
    // ════════════════════════════════════════════════════════
    function esc(s) {
      return s
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;');
    }

    // ════════════════════════════════════════════════════════
    //  INIT
    // ════════════════════════════════════════════════════════
    render();
  </script>
</body>

</html>
