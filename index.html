<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Simple Todo</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body class="theme-classic">

  <!-- DRAWER -->
  <div id="drawer">
    <div class="drawer-section">Menu</div>
    <div class="drawer-item" onclick="openSearch()">
      <span class="di-icon" data-icon="search"></span> Search
    </div>
    <div class="drawer-item" onclick="openThemes()">
      <span class="di-icon" data-icon="palette"></span> Themes
    </div>
    <div class="drawer-item" onclick="openSettings()">
      <span class="di-icon" data-icon="settings"></span> Settings
    </div>
    <div class="drawer-item" onclick="openHistory()">
      <span class="di-icon" data-icon="history"></span> History
    </div>
    <div class="drawer-item" onclick="openAbout()">
      <span class="di-icon" data-icon="info"></span> About
    </div>
    <div class="drawer-spacer"></div>
    <div class="drawer-div"></div>
    <div class="drawer-clear" onclick="confirmClearAll()">
      <span class="dc-icon" data-icon="delete"></span> Clear All
    </div>
  </div>

  <!-- PULL-TO-SEARCH HINT -->
  <div id="pullSearch">
    <span class="ps-ico" data-icon="search"></span>
    <span class="ps-txt">Pull to search</span>
  </div>

  <!-- MAIN -->
  <div id="main">
    <div id="drawerMask"></div>
    <div class="app-header">
      <div class="app-title" id="appTitle" contenteditable="true" spellcheck="false" data-placeholder="Simple Todo">
      </div>
    </div>
    <div id="spaceTabs"></div>
    <div class="categories" id="categoriesContainer"></div>
  </div>

  <!-- BOTTOM SHEET -->
  <div class="sheet-overlay" id="sheetOverlay">
    <div class="sheet">
      <div class="sheet-label" id="sheetLabel">Options</div>
      <div id="sheetItems"></div>
    </div>
  </div>

  <!-- DIALOG -->
  <div class="dialog-overlay" id="dialogOverlay">
    <div class="dialog">
      <div class="dialog-title" id="dialogTitle">Rename</div>
      <input type="text" id="dialogInput" placeholder="Category name…" spellcheck="true" autocapitalize="sentences" autocomplete="off" autocorrect="on" />
      <div id="dialogTextarea" class="dialog-edit empty" contenteditable="true" role="textbox" aria-multiline="true" spellcheck="true" autocapitalize="sentences" autocorrect="on" data-placeholder="Describe your task…" style="display:none"></div>
      <div class="dialog-hint" id="dialogHint" style="display:none">Ctrl + Enter to save</div>
      <div class="dialog-buttons">
        <button class="d-btn cancel" onclick="closeDialog()">Cancel</button>
        <button class="d-btn confirm" onclick="confirmDialog()">Save</button>
      </div>
    </div>
  </div>

  <!-- FIRST-RUN TOUR -->
  <div class="tour-overlay" id="tour">
    <div class="tour-card">
      <div class="tour-demo" id="tourDemo"></div>
      <div class="tour-title" id="tourTitle"></div>
      <div class="tour-text" id="tourText"></div>
      <div class="tour-dots" id="tourDots"></div>
      <div class="tour-actions">
        <button class="tour-skip" id="tourSkip" onclick="closeTour(true)">Skip</button>
        <button class="tour-next" id="tourNext" onclick="tourNext()">Next</button>
      </div>
    </div>
  </div>


  <script src="vendor/peerjs.min.js"></script>
  <script src="ui.js"></script>
  <script src="app.js"></script>
  <script src="sync.js"></script>
</body>

</html>
